    <script>
        const SUPABASE_URL = "https://dedytnfmdjtfabqxkjcv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_xR2GR31GRTy7rkEpWGVsZw_lxLAgNfO";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const SUPABASE_TABLE_NAME = "snippets"; 

        window.turtleTimer = null;
        window.isRunning = false;
        
        window.currentInputResolver = null;
        window.currentInputWrapper = null;
        window.currentDecorations = [];
        window.setRunningState = function(running) {
            window.isRunning = running;
            const runBtn = document.getElementById('run-btn');
            runBtn.innerText = running ? 'Pysäytä' : 'Suorita';
        };
        window.toggleTurtleCanvas = function(show) {
            const turtleDiv = document.getElementById('turtle-div');
            const resizerH = document.getElementById('resizer-h');
            if (show) {
                turtleDiv.style.display = 'flex';
                resizerH.style.display = 'block';
                if (turtleDiv.style.height === '0px' || !turtleDiv.style.height) {
                    turtleDiv.style.height = '50%';
                }
            } else {
                turtleDiv.style.display = 'none';
                resizerH.style.none = 'block';
            }
        };
        window.highlightErrorLine = function(lineNum) {
            if (!window.editor || lineNum < 1) return;
            window.currentDecorations = window.editor.deltaDecorations(window.currentDecorations, [
                {
                    range: new monaco.Range(lineNum, 1, lineNum, 1),
                    options: {
                        isWholeLine: true,
                        className: 'error-line-highlight'
                    }
                }
            ]);
        };
        window.clearErrorHighlights = function() {
            if (window.editor && window.currentDecorations.length > 0) {
                window.currentDecorations = window.editor.deltaDecorations(window.currentDecorations, []);
            }
        };
        window.stopExecution = function() {
            clearTimeout(window.turtleTimer);
            const canvas = document.getElementById('turtle-div');
            if (canvas) canvas.innerHTML = '';
            
            if (window.currentInputWrapper) {
                const outNode = document.getElementById('console-output');
                try { outNode.removeChild(window.currentInputWrapper); } catch(e) {}
                if (window.currentInputResolver) window.currentInputResolver('');
                window.currentInputWrapper = null;
                window.currentInputResolver = null;
            }
            if (window.abort_buffer) window.abort_buffer();
            window.setRunningState(false);
        };
        window.requestInlineInput = function(promptText) {
            return new Promise((resolve) => {
                const outNode = document.getElementById('console-output');
                const logArea = document.getElementById('console-log-area');
                
                if (promptText) {
                    let standardPrompt = promptText;
                    if (!standardPrompt.endsWith('\n')) {
                        standardPrompt += '\n';
                    }
                    outNode.appendChild(document.createTextNode(standardPrompt));
                }
                const rowContainer = document.createElement('div');
                rowContainer.className = 'terminal-input-row-container';
                
                const caretPrefix = document.createElement('span');
                caretPrefix.className = 'terminal-caret';
                caretPrefix.innerText = '> ';
                
                const inputField = document.createElement('input');
                inputField.type = 'text';
                inputField.className = 'terminal-inline-input';
                inputField.autocomplete = 'off';
                inputField.spellcheck = false;
                const customThickCursor = document.createElement('span');
                customThickCursor.className = 'terminal-thick-cursor';
                rowContainer.appendChild(caretPrefix);
                rowContainer.appendChild(inputField);
                rowContainer.appendChild(customThickCursor);
                outNode.appendChild(rowContainer);
                logArea.scrollTop = logArea.scrollHeight;
                setTimeout(() => inputField.focus(), 20);
                window.currentInputResolver = resolve;
                window.currentInputWrapper = rowContainer;
                inputField.addEventListener('input', function() {
                    inputField.style.width = Math.max(1, inputField.value.length) + 'ch';
                    logArea.scrollTop = logArea.scrollHeight;
                });
                inputField.addEventListener('keydown', function(event) {
                    if (event.key === 'Enter') {
                        const val = inputField.value;
                        outNode.removeChild(rowContainer);
                        
                        const historyRow = document.createElement('div');
                        historyRow.className = 'terminal-input-row-container';
                        
                        const historyPrefix = document.createElement('span');
                        historyPrefix.className = 'terminal-caret';
                        historyPrefix.innerText = '> ';
                        
                        const textSpan = document.createElement('span');
                        textSpan.className = 'user-submitted-span';
                        textSpan.innerText = val;
                        historyRow.appendChild(historyPrefix);
                        historyRow.appendChild(textSpan);
                        outNode.appendChild(historyRow);
                        outNode.appendChild(document.createTextNode('\n'));
                        
                        logArea.scrollTop = logArea.scrollHeight;
                        
                        window.currentInputResolver = null;
                        window.currentInputWrapper = null;
                        resolve(val);
                    }
                });
            });
        };
        const parseDur = (str) => {
            if (!str) return 0;
            const val = parseFloat(str);
            if (isNaN(val)) return 0;
            if (str.toLowerCase().endsWith('ms')) return val;
            if (str.toLowerCase().endsWith('s')) return val * 1000;
            return val * 1000; 
         };
        window.syncTurtleOutput = function() {
            setTimeout(() => {
                const canvas = document.getElementById('turtle-div');
                if (!canvas) return;
                const animations = canvas.querySelectorAll('animate, animateTransform, animateMotion, set');
                if (animations.length === 0) {
                    if (window.trigger_flush) window.trigger_flush();
                    window.setRunningState(false);
                    return;
                }
                let totalCumulativeDuration = 0;
                animations.forEach(anim => {
                    totalCumulativeDuration += parseDur(anim.getAttribute('dur'));
                });
                let eventFired = false;
                const completeExecution = () => {
                    if (!eventFired) {
                        eventFired = true;
                        clearTimeout(window.turtleTimer);
                        if (window.trigger_flush) window.trigger_flush();
                        window.setRunningState(false);
                    }
                };
                const lastAnimation = animations[animations.length - 1];
                lastAnimation.addEventListener('endEvent', completeExecution);
                lastAnimation.addEventListener('end', completeExecution); 
                clearTimeout(window.turtleTimer);
                window.turtleTimer = setTimeout(completeExecution, totalCumulativeDuration + 100);
            }, 20);
        };
        window.clearConsole = function() {
            const consoleOut = document.getElementById('console-output');
            if (consoleOut) consoleOut.innerHTML = '';
        };
        function toggleMobileView() {
            const workspace = document.getElementById('workspace');
            if (workspace.classList.contains('mobile-show-editor')) {
                workspace.classList.remove('mobile-show-editor');
                workspace.classList.add('mobile-show-output');
            } else {
                workspace.classList.remove('mobile-show-output');
                workspace.classList.add('mobile-show-editor');
                if (window.editor) { setTimeout(() => window.editor.layout(), 10); }
            }
        }
        
        async function handleShareCode() {
            if (!window.editor) return;
            const userCode = window.editor.getValue();
            const footer = document.getElementById('footer');
            
            if (!userCode.trim()) {
                footer.innerText = "Kirjoita ensin koodia jaettavaksi!";
                return;
            }
            
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            let tunnus = '';
            for (let i = 0; i < 30; i++) {
                tunnus += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            
            try {
                const { error } = await supabaseClient
                    .from(SUPABASE_TABLE_NAME)
                    .insert([{ code: userCode, tunnus: tunnus }]);
                
                if (error) throw error;
                
                const shareUrl = `${window.location.origin}${window.location.pathname}?tunnus=${tunnus}`;
                await navigator.clipboard.writeText(shareUrl);
                
                footer.innerHTML = `Linkki kopioitu leikepöydälle: <a href="${shareUrl}" target="_blank" style="color: #0e639c; text-decoration: underline; font-weight: 600; margin-left: 5px;">${shareUrl}</a>`;
                
                footer.style.backgroundColor = '#e0f2fe'; 
                setTimeout(() => {
                    footer.style.backgroundColor = '#fcfcfc'; 
                }, 400);

            } catch (err) {
                console.error("Virhe tallennuksessa:", err);
                footer.innerText = "Virhe tallennettaessa koodia tietokantaan.";
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const resizerV = document.getElementById('resizer-v');
            const resizerH = document.getElementById('resizer-h');
            const leftPane = document.getElementById('left-pane');
            const turtleDiv = document.getElementById('turtle-div');
            const workspace = document.getElementById('workspace');
            const rightPane = document.getElementById('right-pane');
            workspace.classList.add('mobile-show-editor');
            
            document.getElementById('console-log-area').addEventListener('click', () => {
                const activeInputField = document.querySelector('.terminal-inline-input');
                if (activeInputField) { activeInputField.focus(); }
            });
            
            document.getElementById('share-btn').addEventListener('click', handleShareCode);

            resizerV.addEventListener('mousedown', (e) => {
                e.preventDefault();
                workspace.classList.add('resizing-v');
                document.addEventListener('mousemove', handleMouseMoveV);
                document.addEventListener('mouseup', handleMouseUpV);
            });
            function handleMouseMoveV(e) {
                const containerWidth = workspace.clientWidth;
                let pct = (e.clientX / containerWidth) * 100;
                if (pct < 20) pct = 20; if (pct > 80) pct = 80;
                leftPane.style.width = `${pct}%`;
                if (window.editor) window.editor.layout();
            }
            function handleMouseUpV() {
                workspace.classList.remove('resizing-v');
                document.removeEventListener('mousemove', handleMouseMoveV);
                document.removeEventListener('mouseup', handleMouseUpV);
            }
            resizerH.addEventListener('mousedown', (e) => {
                e.preventDefault();
                workspace.classList.add('resizing-h');
                document.addEventListener('mousemove', handleMouseMoveH);
                document.addEventListener('mouseup', handleMouseUpH);
            });
            function handleMouseMoveH(e) {
                const relativeY = e.clientY - rightPane.getBoundingClientRect().top;
                let pct = (relativeY / rightPane.getBoundingClientRect().height) * 100;
                if (pct < 15) pct = 15; if (pct > 85) pct = 85;
                turtleDiv.style.height = `${pct}%`;
            }
            function handleMouseUpH() {
                workspace.classList.remove('resizing-h');
                document.removeEventListener('mousemove', handleMouseMoveH);
                document.removeEventListener('mouseup', handleMouseUpH);
            }
            document.getElementById('switch-btn').addEventListener('click', toggleMobileView);
            
            require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.45.0/min/vs' } });
            require(['vs/editor/editor.main'], async function() {
                const urlParams = new URLSearchParams(window.location.search);
                const tunnusParam = urlParams.get('tunnus');
                let initialCode = '';
                
                if (tunnusParam) {
                    try {
                        const { data, error } = await supabaseClient
                            .from(SUPABASE_TABLE_NAME)
                            .select('code')
                            .eq('tunnus', tunnusParam)
                            .maybeSingle();
                        
                        if (error) throw error;
                        if (data) {
                            initialCode = data.code;
                        } else {
                            initialCode = '# Virhe: Koodia ei löytynyt annetulla tunnuksella.';
                        }
                    } catch (err) {
                        console.error("Virhe koodin haussa:", err);
                        initialCode = '# Virhe ladattaessa koodia tietokannasta.';
                    }
                } else {
                    initialCode = urlParams.get('code') || '';
                }

                window.editor = monaco.editor.create(document.getElementById('editor-container'), {
                    value: initialCode,
                    language: 'python',
                    theme: 'vs', 
                    automaticLayout: true,
                    fontSize: 17.5, 
                    minimap: { enabled: false }
                });
                window.editor.onDidChangeModelContent(() => {
                    window.clearErrorHighlights();
                });
            });
        });
    </script>

    <script type="text/python">
        from browser import document, window, aio, html
        import sys
        import traceback
        import ast

        class DOMOutput:
            buffer = []
            is_animating = False
            def __init__(self, element_id, is_error=False):
                self.element = document[element_id]
                self.is_error = is_error
            def write(self, text):
                if DOMOutput.is_animating:
                    DOMOutput.buffer.append({'text': text, 'is_error': self.is_error, 'element': self.element})
                else:
                    self._direct_write(text)
            def _direct_write(self, text):
                if self.is_error:
                    self.element <= html.SPAN(str(text), Class="error-text")
                else:
                    self.element <= str(text)
                log_area = document["console-log-area"]
                log_area.scrollTop = log_area.scrollHeight
            @staticmethod
            def flush_buffer():
                for item in DOMOutput.buffer:
                    if item['is_error']:
                        item['element'] <= html.SPAN(str(item["text"]), Class="error-text")
                    else:
                        item['element'] <= str(item['text'])
                DOMOutput.buffer.clear()
                log_area = document["console-log-area"]
                log_area.scrollTop = log_area.scrollHeight

        sys.stdout = DOMOutput("console-output", is_error=False)
        sys.stderr = DOMOutput("console-output", is_error=True)

        def trigger_flush():
            DOMOutput.is_animating = False
            DOMOutput.flush_buffer()
        def abort_buffer():
            DOMOutput.is_animating = False
            DOMOutput.buffer.clear()

        window.trigger_flush = trigger_flush
        window.abort_buffer = abort_buffer

        class CodeCoordinateMapper(ast.NodeVisitor):
            def __init__(self):
                self.has_input = False
                self.func_names = set()
                self.mods = []
            def visit_Call(self, node):
                if isinstance(node.func, ast.Name) and node.func.id == 'input':
                    self.has_input = True
                    self.mods.append((node.func.lineno, node.func.col_offset, node.func.end_lineno, node.func.end_col_offset, "await __custom_async_input__"))
                self.generic_visit(node)
            def visit_FunctionDef(self, node):
                self.func_names.add(node.name)
                self.mods.append((node.lineno, node.col_offset, node.lineno, node.col_offset + 3, "async def"))
                self.generic_visit(node)

        class FunctionCallAwaitedMapper(ast.NodeVisitor):
            def __init__(self, func_names, mods):
                self.func_names = func_names
                self.mods = mods
            def visit_Call(self, node):
                if isinstance(node.func, ast.Name) and node.func.id in self.func_names:
                    self.mods.append((node.func.lineno, node.func.col_offset, node.lineno, node.col_offset, "await "))
                self.generic_visit(node)

        def apply_string_modifications(source_text, modifications):
            modifications.sort(key=lambda x: (x[0], x[1]), reverse=True)
            lines = source_text.splitlines()
            
            for start_line, start_col, end_line, end_col, replacement in modifications:
                s_idx = start_line - 1
                e_idx = end_line - 1
                if s_idx == e_idx:
                    target_line = lines[s_idx]
                    lines[s_idx] = target_line[:start_col] + replacement + target_line[end_col:]
            return "\n".join(lines)

        async def run_code():
            document["console-output"].innerHTML = ""
            document["turtle-div"].innerHTML = ""
            window.clearErrorHighlights()
            
            user_code = window.editor.getValue()
            window.setRunningState(True)
            
            has_turtle = "turtle" in user_code
            window.toggleTurtleCanvas(has_turtle)
            
            DOMOutput.is_animating = has_turtle
            runtime_globals = {}
            mapper_has_input = False
            
            try:
                setup = (
                    "import sys\n"
                    "if 'turtle' in sys.modules:\n"
                    "    try:\n"
                    "        import turtle\n"
                    "        turtle._screen = None\n"
                    "    except:\n"
                    "        pass\n"
                    "    del sys.modules['turtle']\n"
                    "from browser import document\n"
                    "import turtle\n"
                    "turtle.set_defaults(turtle_canvas_wrapper=document['turtle-div'])\n"
                )
                exec(setup, runtime_globals)
                
                async def __custom_async_input__(prompt_msg=""):
                    if DOMOutput.is_animating: DOMOutput.flush_buffer()
                    res = await window.requestInlineInput(str(prompt_msg))
                    return res
                runtime_globals['__custom_async_input__'] = __custom_async_input__
                
                if user_code.strip():
                    tree = ast.parse(user_code)
                    mapper = CodeCoordinateMapper()
                    mapper.visit(tree)
                    mapper_has_input = mapper.has_input
                    
                    if mapper.has_input:
                        call_mapper = FunctionCallAwaitedMapper(mapper.func_names, mapper.mods)
                        call_mapper.visit(tree)
                        
                        top_level_vars = set()
                        for node in tree.body:
                            if isinstance(node, (ast.Assign, ast.AnnAssign)):
                                targets = node.targets if hasattr(node, 'targets') else [node.target]
                                for target in targets:
                                    if isinstance(target, ast.Name):
                                        top_level_vars.add(target.id)
                                    elif isinstance(target, (ast.Tuple, ast.List)):
                                        for elt in target.elts:
                                            if isinstance(elt, ast.Name):
                                                top_level_vars.add(elt.id)
                            elif isinstance(node, ast.For):
                                if isinstance(node.target, ast.Name):
                                    top_level_vars.add(node.target.id)
                        transformed_source = apply_string_modifications(user_code, mapper.mods)
                        indented_body = "\n".join("    " + line for line in transformed_source.splitlines())
                        
                        global_declaration_header = f"    global {', '.join(top_level_vars)}\n" if top_level_vars else "    pass\n"
                        
                        wrapped_execution_string = (
                            f"async def __main__():\n"
                            f"{global_declaration_header}"
                            f"{indented_body}\n"
                        )
                        
                        exec(wrapped_execution_string, runtime_globals)
                        await runtime_globals['__main__']()
                    else:
                        exec(user_code, runtime_globals)
                if "turtle" in runtime_globals:
                    exec("turtle.done()", runtime_globals)
                    window.syncTurtleOutput() 
                else:
                    DOMOutput.is_animating = False
                    DOMOutput.flush_buffer()
                    window.setRunningState(False)
                    
            except Exception as e:
                traceback.print_exc()
                DOMOutput.is_animating = False
                DOMOutput.flush_buffer()
                window.setRunningState(False)
                
                err_line = None
                if hasattr(e, 'lineno') and e.lineno is not None:
                    err_line = e.lineno
                else:
                    tb = e.__traceback__
                    while tb is not None:
                        filename = tb.tb_frame.f_code.co_filename
                        if filename in ('<string>', '__main__', '<module>'):
                            err_line = tb.tb_lineno
                        tb = tb.tb_next
                        
                if err_line is not None:
                    if mapper_has_input:
                        err_line = err_line - 2 
                    if err_line > 0:
                        window.highlightErrorLine(err_line)

        def handle_click(event):
            if window.isRunning:
                window.stopExecution()
                return
            aio.run(run_code())

        document["run-btn"].bind("click", handle_click)
    </script>
</body>
