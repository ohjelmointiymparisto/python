<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python</title>
    <script type="text/javascript" src="https://unpkg.com/brython@3.13.0/brython.min.js"></script>
    <script type="text/javascript" src="https://unpkg.com/brython@3.13.0/brython_stdlib.js"></script>
    <script type="text/javascript" src="https://unpkg.com/@supabase/supabase-js@2.43.0/dist/umd/supabase.js"></script>
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
        }
        #code-section {
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        #button-area {
            display: flex;
            gap: 0;
            height: 40px;
        }
        button {
            flex: 1;
            padding: 10px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 0;
            cursor: pointer;
            transition: background 0.2s;
            color: #333;
            border-right: 1px solid #ccc;
        }
        #run-btn {
            background-color: #ffffff;
        }
        #run-btn:hover {
            background-color: #f0f0f0;
        }
        #stop-btn {
            background-color: #ffffff;
        }
        #stop-btn:hover {
            background-color: #f0f0f0;
        }
        #share-btn {
            background-color: #ffffff;
        }
        #share-btn:hover {
            background-color: #f0f0f0;
        }
        #container {
            display: flex;
            gap: 0;
            max-width: 100%;
            margin: 0;
            padding: 0;
            height: 100vh;
        }
        textarea {
            flex: 1;
            font-family: 'Courier New', Courier, monospace;
            font-size: 16px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 0;
            resize: none;
            box-shadow: none;
        }
        #divider {
            width: 6px;
            height: 100%;
            background-color: #ddd;
            cursor: col-resize;
            user-select: none;
            transition: background-color 0.2s;
            flex: 0 0 6px;
        }
        #divider:hover {
            background-color: #999;
        }
        #turtle-div {
            width: 100%;
            flex: 1;
            border: 1px solid #ccc;
            border-radius: 0;
            background-color: #ffffff;
            box-shadow: none;
            overflow: hidden;
            display: flex;
        }
        #turtle-div svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        #output-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            height: 100%;
        }
        #console-output {
            flex: 1;
            border: 1px solid #ccc;
            border-top: none;
            border-radius: 0;
            background-color: #f5f5f5;
            overflow-y: auto;
            padding: 10px;
            font-family: 'Courier New', monospace;
            font-size: 16px;
            color: #333;
        }
        .share-url-container {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            text-align: center;
            margin: 0;
            padding: 10px 20px;
            background: #fff;
            border-top: 1px solid #ccc;
            z-index: 10;
        }
        #share-status {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 5px;
        }
        #share-url {
            font-weight: bold;
            color: #2980b9;
            word-break: break-all;
        }
    </style>
</head>
<body onload="brython()">
    <div id="container">
        <div id="code-section">
            <div id="button-area">
                <button id="run-btn" onclick="runPython()">Suorita</button>
                <button id="stop-btn" onclick="stopPython()">Pysäytä</button>
                <button id="share-btn" type="button" onclick="shareSnippet()">Jaa (kopioi linkki)</button>
            </div>
            <textarea id="code" placeholder="Koodi tähän..."></textarea>
        </div>
        <div id="divider"></div>
        <div id="output-area">
            <div id="turtle-div"></div>
            <div id="console-output"></div>
        </div>
    </div>
    <div class="share-url-container">
        <p id="share-status">&copy; <a href="https://toivo.pages.dev" target="_blank">Toivo Muukkonen</a> 2026</p>
        <span id="share-url"></span>
    </div>
    <script>
        const SUPABASE_URL = "https://dedytnfmdjtfabqxkjcv.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_xR2GR31GRTy7rkEpWGVsZw_lxLAgNfO";
        
        const supabaseClient = window.supabase ? supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY) : null;
        let pendingRunTimer = null;
function generateShareId() {
    const bytes = new Uint8Array(16);
    window.crypto.getRandomValues(bytes);

    let value = 0n;
    for (const byte of bytes) {
        value = (value << 8n) | BigInt(byte);
    }

    return value.toString(36).padStart(25, '0');
}

        function stopPython() {
            window.__turtleStopRequested = true;

            if (pendingRunTimer !== null) {
                clearTimeout(pendingRunTimer);
                pendingRunTimer = null;
            }

            const turtleDiv = document.getElementById('turtle-div');
            if (turtleDiv) {
                turtleDiv.innerHTML = '';
            }

            const consoleOutput = document.getElementById('console-output');
            if (consoleOutput) {
                consoleOutput.innerHTML += '<br><span style="color:#c0392b; font-weight:bold;">Pysäytetty.</span><br>';
            }
        }

        function runPython() {
            window.__turtleStopRequested = true;
            if (pendingRunTimer !== null) {
                clearTimeout(pendingRunTimer);
            }

            window.__turtleStopRequested = false;

            const turtleDiv = document.getElementById('turtle-div');
            turtleDiv.innerHTML = '';
            document.getElementById('console-output').innerHTML = '';
            
            const code = document.getElementById('code').value;
            const turtleWidth = Math.max(1, turtleDiv.clientWidth || 600);
            const turtleHeight = Math.max(1, turtleDiv.clientHeight || 600);
            
            const prependedSetupCode = `
import sys
from browser import document, window, aio
import turtle

class PageOutput:
    def __init__(self, element_id):
        self.element_id = element_id
    
    def write(self, text):
        el = document[self.element_id]
        el.innerHTML += str(text).replace('\\n', '<br>')
    
    def flush(self):
        pass

sys.stdout = PageOutput('console-output')

turtle.set_defaults(
    canvwidth=${turtleWidth},
    canvheight=${turtleHeight},
    turtle_canvas_wrapper=document['turtle-div']
)

async def _wait_for_turtle_animations():
    while True:
        if getattr(window, '__turtleStopRequested', False):
            break
        el = document['turtle-div']
        if not el.querySelector('animate, animateMotion, animateTransform'):
            break
        await aio.sleep(0.01)

if not hasattr(turtle, '_patched_for_sync'):
    turtle._patched_for_sync = True
    
    _orig_done = turtle.done
    def _done_wrapper():
        if getattr(window, '__turtleStopRequested', False):
            return None
        return _orig_done()
    turtle.done = _done_wrapper

async def __wrapper_execution_scope():
    try:
`;

            const appendedCleanupCode = `
        await aio.sleep(0.05)
        await _wait_for_turtle_animations()
        turtle.done()
    except Exception as e:
        sys.stderr.write(str(e))

aio.run(__wrapper_execution_scope())
`;

            const indentedUserCode = code.split('\n').map(line => '        ' + line).join('\n');
            const fullCode = prependedSetupCode + indentedUserCode + appendedCleanupCode;
            
            try {
                console.log('Suoritetaan');
                
                const script = document.createElement('script');
                script.type = 'text/python';
                script.textContent = fullCode;
                document.body.appendChild(script);
                
                pendingRunTimer = setTimeout(() => {
                    try {
                        brython({debug: 0});
                    } catch (err) {
                        console.error('Virhe:', err);
                        const consoleOutput = document.getElementById('console-output');
                        if (consoleOutput) {
                            consoleOutput.innerHTML += '<span style="color:red">Virhe: ' + err + '</span><br>';
                        }
                    } finally {
                        pendingRunTimer = null;
                    }
                }, 100);
                
                console.log('Ajastettu');
            } catch(err) {
                console.error("Virhe:", err);
                document.getElementById('console-output').innerHTML += '<span style="color:red">Virhe: ' + err + '</span><br>';
            }
        }

        async function shareSnippet() {
            const codeText = document.getElementById('code').value;
            const statusEl = document.getElementById('share-status');
            const urlEl = document.getElementById('share-url');
            
            if (!codeText.trim()) return alert("Kirjoita koodi ennen jakamista!");
            if (!supabaseClient) {
                alert('Ei voitu tallentaa.');
                return;
            }

            const uniqueId = generateShareId();

            statusEl.innerText = "Jaetaan...";
            urlEl.innerText = "";

            const { error } = await supabaseClient
                .from('snippets')
                .insert([{ tunnus: uniqueId, code: codeText }]);

            if (error) {
                console.error(error);
                statusEl.innerText = "Virhe tallentaessa.";
                alert('Ei voitu tallentaa. Kurkista konsoliin.');
                return;
            }

            const shareLink = window.location.origin + window.location.pathname + "?id=" + uniqueId;
            statusEl.innerText = "Jakolinkki luotu! Kopioi:";
            urlEl.innerText = shareLink;

            try {
                await navigator.clipboard.writeText(shareLink);
                statusEl.innerText = "Jakolinkki kopioitu leikepöydälle.";
            } catch (clipboardError) {
                console.warn('Tallennus onnistui, muttei voitu kopioida:', clipboardError);
            }
        }

        async function loadSnippetFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            const snippetId = urlParams.get('id');

            if (snippetId) {
                if (!supabaseClient) {
                    alert('Ei voitu tallentaa.');
                    return;
                }

                const codeArea = document.getElementById('code');
                codeArea.value = "# Ladataan...";
                
                const { data, error } = await supabaseClient
                    .from('snippets')
                    .select('code') 
                    .eq('tunnus', snippetId)
                    .single();

                if (error || !data) {
                    alert("Tallennetta ei löytynyt.");
                    window.history.replaceState({}, document.title, window.location.pathname);
                    codeArea.value = "";
                } else {
                    codeArea.value = data.code;
                }
            }
        }

        loadSnippetFromURL();

        const divider = document.getElementById('divider');
        const container = document.getElementById('container');
        const codeSection = document.getElementById('code-section');
        const outputArea = document.getElementById('output-area');
        let isResizing = false;

        divider.addEventListener('mousedown', () => {
            isResizing = true;
        });

        document.addEventListener('mousemove', (e) => {
            if (!isResizing) return;

            const containerRect = container.getBoundingClientRect();
            const newCodeWidth = e.clientX - containerRect.left;
            const containerWidth = containerRect.width;
            const dividerWidth = 6;

            if (newCodeWidth > 200 && newCodeWidth < containerWidth - 200) {
                codeSection.style.flex = `0 0 ${newCodeWidth}px`;
                divider.style.flex = `0 0 ${dividerWidth}px`;
                outputArea.style.flex = `1`;
            }
        });

        document.addEventListener('mouseup', () => {
            isResizing = false;
        });
    </script>
</body>
</html>
